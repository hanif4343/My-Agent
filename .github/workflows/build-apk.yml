name: Build APK

# Actions ট্যাব থেকে ম্যানুয়ালি "Run workflow" চাপলেই APK বানাবে।
# এটা Play Store release-signed না — শুধু নিজের ফোনে টেস্ট ইনস্টলের জন্য
# (ফোনে "Install from unknown sources" অনুমতি দিতে হবে)।
on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      - name: pubspec.yaml আছে কিনা চেক করা
        run: |
          if [ ! -f "app/pubspec.yaml" ]; then
            echo "::error::app/pubspec.yaml পাওয়া যায়নি। আগে orchestrator চালিয়ে Flutter প্রজেক্ট স্ক্যাফোল্ড করাও।"
            exit 1
          fi

      - name: Dependencies আনা
        working-directory: app
        run: flutter pub get

      - name: APK build করা (release, debug keystore দিয়ে সাইন করা)
        working-directory: app
        run: flutter build apk --release

      - name: APK আপলোড করা (এখান থেকে ডাউনলোড করা যাবে)
        uses: actions/upload-artifact@v4
        with:
          name: our-story-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
