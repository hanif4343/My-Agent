name: Build APK

# Actions ট্যাব থেকে ম্যানুয়ালি "Run workflow" চাপলেই APK বানাবে।
# সরাসরি My-Story-from-Agent রিপো checkout করে build করে —
# এটা Play Store release-signed না, শুধু নিজের ফোনে টেস্ট ইনস্টলের জন্য।
on:
  workflow_dispatch:

env:
  OUTPUT_REPO: hanif4343/My-Story-from-Agent

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout output repo (${{ env.OUTPUT_REPO }})
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OUTPUT_REPO }}
          token: ${{ secrets.OUTPUT_REPO_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      - name: pubspec.yaml আছে কিনা চেক করা
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            echo "::error::pubspec.yaml পাওয়া যায়নি My-Story-from-Agent রিপোতে। আগে AI Dev Orchestrator workflow চালিয়ে স্ক্যাফোল্ড করাও।"
            exit 1
          fi

      - name: Dependencies আনা
        run: flutter pub get

      - name: APK build করা (release, debug keystore দিয়ে সাইন করা)
        run: flutter build apk --release

      - name: APK আপলোড করা (এখান থেকে ডাউনলোড করা যাবে)
        uses: actions/upload-artifact@v4
        with:
          name: our-story-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
