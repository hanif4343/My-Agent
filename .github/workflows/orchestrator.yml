name: AI Dev Orchestrator

# CONTROL রিপো (My-Agent): orchestrator কোড, tasks.json, PROJECT_RULES.md এখানে থাকে
# OUTPUT রিপো (My-Story-from-Agent): আসল Flutter প্রজেক্ট এখানে জমা হয় ও কমিট হয়
on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

env:
  OUTPUT_REPO: hanif4343/My-Story-from-Agent
  OUTPUT_DIR: output

jobs:
  run-orchestrator:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ধাপ ১: control রিপো (My-Agent) checkout — orchestrator কোড, tasks.json এখানে
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ধাপ ২: output রিপো (My-Story-from-Agent) আলাদা সাবফোল্ডারে checkout —
      # আসল Flutter প্রজেক্ট এখানে লেখা/কমিট হবে। এর জন্য আলাদা token লাগে
      # কারণ ডিফল্ট GITHUB_TOKEN শুধু এই (My-Agent) রিপোতেই কাজ করে।
      - name: Checkout output repo (${{ env.OUTPUT_REPO }})
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OUTPUT_REPO }}
          token: ${{ secrets.OUTPUT_REPO_TOKEN }}
          path: ${{ env.OUTPUT_DIR }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install orchestrator dependencies
        run: pip install -r requirements.txt

      - name: Detect project language
        id: detect
        run: |
          if [ -f "${{ env.OUTPUT_DIR }}/orchestrator.config.json" ]; then
            LANG=$(python3 -c "import json;print(json.load(open('${{ env.OUTPUT_DIR }}/orchestrator.config.json')).get('language','generic'))")
            echo "language=$LANG" >> "$GITHUB_OUTPUT"
            echo "প্রজেক্টের ভাষা শনাক্ত হলো: $LANG"
          else
            echo "language=generic" >> "$GITHUB_OUTPUT"
            echo "::warning::${{ env.OUTPUT_DIR }}/orchestrator.config.json পাওয়া যায়নি! ভাষা 'generic' ধরা হচ্ছে — validate_commands খালি থাকবে, মানে flutter analyze/test/pub get কিছুই চলবে না এবং AI-এর কোড কোনো যাচাই ছাড়াই commit হবে। এটা এড়াতে output রিপোর রুটে orchestrator.config.json বসাও।"
          fi

      - name: Setup Flutter
        if: steps.detect.outputs.language == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      - name: Flutter প্রজেক্ট স্ক্যাফোল্ড করা (প্রথমবার, pubspec.yaml না থাকলে)
        if: steps.detect.outputs.language == 'flutter'
        run: |
          if [ ! -f "${{ env.OUTPUT_DIR }}/pubspec.yaml" ]; then
            echo "pubspec.yaml পাওয়া যায়নি — নতুন Flutter প্রজেক্ট স্ক্যাফোল্ড করা হচ্ছে..."
            flutter create --org com.hanifsantona --project-name our_story ${{ env.OUTPUT_DIR }}
            echo "স্ক্যাফোল্ড সম্পন্ন।"
          else
            echo "pubspec.yaml আগে থেকেই আছে, স্কিপ করা হলো।"
          fi

      - name: Setup Java (Kotlin/Gradle প্রজেক্টের জন্য)
        if: steps.detect.outputs.language == 'kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Node.js
        if: steps.detect.outputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure git identity
        run: |
          git config --global user.name "ai-orchestrator-bot"
          git config --global user.email "bot@users.noreply.github.com"

      - name: Run orchestrator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python -m orchestrator.main \
            --project ./${{ env.OUTPUT_DIR }} \
            --tasks ./tasks.json \
            --rules ./PROJECT_RULES.md \
            --max-tasks 10

      # গুরুত্বপূর্ণ: tasks.json এর status update (pending → done/failed) control রিপোতে
      # (My-Agent) ফেরত commit+push না করলে পরের রান আবার সব টাস্ক নতুন করে করবে।
      - name: tasks.json এর status control রিপোতে সেভ করা
        run: |
          git add tasks.json
          git commit -m "Update task status [skip ci]" || echo "কোনো পরিবর্তন নেই"
          git push

      # কোনো টাস্ক max retry শেষেও fail থাকলে সেগুলোর তালিকা বের করা।
      - name: Check for unresolved failed tasks
        id: check_failed
        run: |
          python3 -c "
          import json
          tasks = json.load(open('tasks.json'))
          failed = [t for t in tasks if t.get('status') == 'failed']
          if failed:
              lines = [f\"- {t['id']}: {t['title']} (provider: {t.get('provider','?')})\" for t in failed]
              body = 'নিচের টাস্কগুলো AI নিজে থেকে ঠিক করতে পারেনি, ম্যানুয়াল চেক দরকার:' + chr(10) + chr(10).join(lines)
              print('has_failed=true')
              with open('failed_summary.txt', 'w') as f:
                  f.write(body)
          else:
              print('has_failed=false')
          " | tee /tmp/check_output.txt
          if grep -q "has_failed=true" /tmp/check_output.txt; then
            echo "has_failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send email alert (manual fix প্রয়োজন হলে)
        if: steps.check_failed.outputs.has_failed == 'true'
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "⚠️ AI Orchestrator: ম্যানুয়াল ফিক্স দরকার (${{ github.repository }})"
          to: ${{ secrets.MAIL_TO }}
          from: AI Dev Orchestrator
          body: file://failed_summary.txt
