name: AI Dev Orchestrator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  run-orchestrator:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install orchestrator dependencies
        run: pip install -r requirements.txt

      - name: Detect project language
        id: detect
        run: |
          if [ -f "app/orchestrator.config.json" ]; then
            LANG=$(python3 -c "import json;print(json.load(open('app/orchestrator.config.json')).get('language','generic'))")
          else
            LANG="generic"
          fi
          echo "language=$LANG" >> "$GITHUB_OUTPUT"
          echo "প্রজেক্টের ভাষা শনাক্ত হলো: $LANG"

      - name: Setup Flutter
        if: steps.detect.outputs.language == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      - name: Flutter প্রজেক্ট স্ক্যাফোল্ড করা (প্রথমবার, pubspec.yaml না থাকলে)
        if: steps.detect.outputs.language == 'flutter'
        run: |
          if [ ! -f "app/pubspec.yaml" ]; then
            echo "pubspec.yaml পাওয়া যায়নি — নতুন Flutter প্রজেক্ট স্ক্যাফোল্ড করা হচ্ছে..."
            flutter create --org com.hanifsantona --project-name our_story app
            echo "স্ক্যাফোল্ড সম্পন্ন।"
          else
            echo "pubspec.yaml আগে থেকেই আছে, স্কিপ করা হলো।"
          fi

      - name: Setup Java (Kotlin/Gradle প্রজেক্টের জন্য)
        if: steps.detect.outputs.language == 'kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Node.js
        if: steps.detect.outputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure git identity
        run: |
          git config --global user.name "ai-orchestrator-bot"
          git config --global user.email "bot@users.noreply.github.com"

      - name: Run orchestrator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python -m orchestrator.main \
            --project ./app \
            --tasks ./tasks.json \
            --rules ./PROJECT_RULES.md \
            --max-tasks 5

      # কোনো টাস্ক max retry শেষেও fail থাকলে সেগুলোর তালিকা বের করা।
      # MAIL_USERNAME/MAIL_PASSWORD/MAIL_TO secret সেট না থাকলে এই ধাপ নিজে থেকে স্কিপ হবে।
      - name: Check for unresolved failed tasks
        id: check_failed
        run: |
          python3 -c "
          import json
          tasks = json.load(open('tasks.json'))
          failed = [t for t in tasks if t.get('status') == 'failed']
          if failed:
              lines = [f\"- {t['id']}: {t['title']} (provider: {t.get('provider','?')})\" for t in failed]
              body = 'নিচের টাস্কগুলো AI নিজে থেকে ঠিক করতে পারেনি, ম্যানুয়াল চেক দরকার:' + chr(10) + chr(10).join(lines)
              print('has_failed=true')
              with open('failed_summary.txt', 'w') as f:
                  f.write(body)
          else:
              print('has_failed=false')
          " | tee /tmp/check_output.txt
          if grep -q "has_failed=true" /tmp/check_output.txt; then
            echo "has_failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send email alert (manual fix প্রয়োজন হলে)
        if: steps.check_failed.outputs.has_failed == 'true'
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "⚠️ AI Orchestrator: ম্যানুয়াল ফিক্স দরকার (${{ github.repository }})"
          to: ${{ secrets.MAIL_TO }}
          from: AI Dev Orchestrator
          body: file://failed_summary.txt
