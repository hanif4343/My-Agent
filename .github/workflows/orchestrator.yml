name: AI Dev Orchestrator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  run-orchestrator:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install orchestrator dependencies
        run: pip install -r requirements.txt

      # প্রজেক্ট রুটে থাকা orchestrator.config.json থেকে ভাষা পড়া হয়।
      # ফাইল না থাকলে বা ফিল্ড না থাকলে "generic" ধরে নেওয়া হয় (কোনো এক্সট্রা setup ছাড়াই)
      - name: Detect project language
        id: detect
        run: |
          if [ -f "app/orchestrator.config.json" ]; then
            LANG=$(python3 -c "import json;print(json.load(open('app/orchestrator.config.json')).get('language','generic'))")
          else
            LANG="generic"
          fi
          echo "language=$LANG" >> "$GITHUB_OUTPUT"
          echo "প্রজেক্টের ভাষা শনাক্ত হলো: $LANG"

      - name: Setup Flutter
        if: steps.detect.outputs.language == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      - name: Setup Java (Kotlin/Gradle প্রজেক্টের জন্য)
        if: steps.detect.outputs.language == 'kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Node.js
        if: steps.detect.outputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # python হলে উপরের actions/setup-python@v5 ধাপই যথেষ্ট, আলাদা কিছু লাগে না

      - name: Configure git identity
        run: |
          git config --global user.name "ai-orchestrator-bot"
          git config --global user.email "bot@users.noreply.github.com"

      - name: Run orchestrator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python -m orchestrator.main \
            --project ./app \
            --tasks ./tasks.json \
            --rules ./PROJECT_RULES.md \
            --max-tasks 5
